# =============================================================================
# LTX-2 Full fine-tuning (8× GPU, FSDP) — Pexels precomputed dataset
# =============================================================================
#
# Data: same layout as LoRA (latents/, conditions/ under preprocessed_data_root).
#
# Launch (8 GPUs, all visible as 0–7):
#   cd /nfs/hanpeng/LTX-2 && uv run accelerate launch \
#     --config_file packages/ltx-trainer/configs/accelerate/fsdp.yaml \
#     packages/ltx-trainer/scripts/train.py \
#     pexels/train_config_full.yaml
#
# If you use CUDA_VISIBLE_DEVICES, set it to 8 IDs and keep num_processes: 8 in fsdp.yaml
# (or override: --num_processes 8).
#
# Full fine-tuning needs large aggregate VRAM; FSDP shards weights across GPUs.
# Start with a lower learning rate than LoRA; increase only if loss is stable.
# =============================================================================

model:
  model_path: "/nfs/hanpeng/huggingface/models/LTX-2.3/ltx-2.3-22b-dev.safetensors"
  text_encoder_path: "/nfs/hanpeng/huggingface/models/gemma-3-12b-it-qat-q4_0-unquantized"
  training_mode: "full"
  load_checkpoint: null

training_strategy:
  name: "text_to_video"
  first_frame_conditioning_p: 0.5
  with_audio: false
  audio_latents_dir: "audio_latents"

optimization:
  # Lower than typical LoRA; raise carefully after monitoring loss
  learning_rate: 1.0e-5
  steps: 300
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "linear"
  scheduler_params: { }
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: null
  load_text_encoder_in_8bit: false

data:
  preprocessed_data_root: "/nfs/hanpeng/LTX-2/pexels/.precomputed"
  num_dataloader_workers: 2

validation:
  prompts:
    - "A woman with long brown hair sits at a wooden desk in a cozy home office, typing on a laptop while occasionally glancing at notes beside her. Soft natural light streams through a large window, casting warm shadows across the room. She pauses to take a sip from a ceramic mug, then continues working with focused concentration. The audio captures the gentle clicking of keyboard keys, the soft rustle of papers, and ambient room tone with occasional distant bird chirps from outside."
    - "A chef in a white uniform stands in a professional kitchen, carefully plating a gourmet dish with precise movements. Steam rises from freshly cooked vegetables as he arranges them with tweezers. The stainless steel surfaces gleam under bright overhead lights, and various pots simmer on the stove behind him. The audio features the sizzling of pans, the clinking of utensils against plates, and the ambient hum of kitchen ventilation."
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted"
  images: null
  video_dims: [ 576, 576, 89 ]
  frame_rate: 25.0
  seed: 42
  inference_steps: 30
  interval: 100
  videos_per_prompt: 1
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_av"
  generate_audio: true
  skip_initial_validation: false

checkpoints:
  interval: 100
  keep_last_n: -1
  precision: "bfloat16"

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: { }

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: false
  project: "ltx-2-trainer"
  entity: null
  tags: [ "ltx2", "full", "pexels", "fsdp-8" ]
  log_validation_videos: true

seed: 42
output_dir: "/nfs/hanpeng/LTX-2/pexels/outputs_full"
